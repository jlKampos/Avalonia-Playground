name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # Define os RIDs e associa o runner adequado para cada um
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      # -----------------------------
      # PUBLISH (COM VERSÃO)
      # -----------------------------
      - name: Publish
        run: >
          dotnet publish OmniWatch/OmniWatch.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -p:Version=1.0.${{ github.run_number }}
          -p:InformationalVersion=1.0.${{ github.run_number }}
          -o publish/${{ matrix.rid }}

      # -----------------------------
      # ASSINATURA (SOMENTE WINDOWS)
      # -----------------------------
      - name: Decode & Sign Windows Binaries
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          Set-Content -Path cert_base64.txt -Value "${{ secrets.WINDOWS_CERTIFICATE }}"
          certutil -decode cert_base64.txt windows_cert.pfx
          $password = "${{ secrets.WINDOWS_CERT_PASSWORD }}"
          $files = Get-ChildItem -Recurse publish/win-x64 -Include *.exe,*.dll
          foreach ($f in $files) {
            signtool sign /f windows_cert.pfx /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $f.FullName
          }
          Remove-Item windows_cert.pfx, cert_base64.txt

      # -----------------------------
      # PACKAGE
      # -----------------------------
      - name: Package Linux
        if: matrix.rid == 'linux-x64'
        run: |
          cd publish/linux-x64
          tar -czf ../../OmniWatch-1.0.${{ github.run_number }}-linux-x64.tar.gz .

      - name: Package Windows
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          cd publish/win-x64
          Compress-Archive -Path * -DestinationPath ../../OmniWatch-1.0.${{ github.run_number }}-win-x64.zip

      # -----------------------------
      # UPLOAD ARTIFACTS
      # -----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OmniWatch-${{ matrix.rid }}
          path: OmniWatch-1.0.${{ github.run_number }}-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OmniWatch 1.0.${{ github.run_number }}
          body: |
            🚀 Release Oficial
            Versão: 1.0.${{ github.run_number }}
          files: artifacts/**/*
          draft: false
          prerelease: false