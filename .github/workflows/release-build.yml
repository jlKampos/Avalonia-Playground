name: Release Build

on:
  workflow_dispatch:

jobs:
  # ============================
  # WINDOWS BUILD + SIGN
  # ============================
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish Windows
        run: >
          dotnet publish OmniWatch/OmniWatch.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -o publish/win-x64

      # -----------------------------
      # DECODE CERTIFICATE
      # -----------------------------
      - name: Decode certificate
        shell: pwsh
        run: |
          Set-Content -Path cert_base64.txt -Value "${{ secrets.WINDOWS_CERTIFICATE }}"
          certutil -decode cert_base64.txt windows_cert.pfx

      # -----------------------------
      # SIGN FILES (CAMINHO ABSOLUTO)
      # -----------------------------
      - name: Sign binaries
        shell: pwsh
        run: |
          $password = "${{ secrets.WINDOWS_CERT_PASSWORD }}"
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"
          $files = Get-ChildItem -Recurse publish/win-x64 -Include *.exe,*.dll
          foreach ($f in $files) {
            & $signtool sign /f windows_cert.pfx /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $f.FullName
          }

      # -----------------------------
      # PACKAGE ZIP
      # -----------------------------
      - name: Package Windows ZIP
        run: |
          cd publish/win-x64
          powershell Compress-Archive -Path * -DestinationPath ../../OmniWatch-win-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniWatch-win-x64
          path: OmniWatch-win-x64.zip

  # ============================
  # LINUX BUILD
  # ============================
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish Linux
        run: >
          dotnet publish OmniWatch/OmniWatch.csproj
          -c Release
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -o publish/linux-x64

      - name: Package Linux TAR.GZ
        run: |
          cd publish/linux-x64
          tar -czf ../../OmniWatch-linux-x64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniWatch-linux-x64
          path: OmniWatch-linux-x64.tar.gz

  # ============================
  # RELEASE JOB
  # ============================
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: OmniWatch 1.0.${{ github.run_number }}
          files: artifacts/**/*
          draft: false
          prerelease: false
