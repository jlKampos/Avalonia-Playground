name: Preview Build

on:
  push:
    branches: [ "ci/preview" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - run: dotnet restore
    - run: dotnet build -c Release --no-restore
    - run: dotnet test -c Release --no-build --logger "trx" --results-directory TestResults

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: preview-test-results
        path: TestResults

  release:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - run: dotnet restore

    - run: dotnet publish OmniWatch/OmniWatch.csproj -c Release -r win-x64 --self-contained true -o publish

    - run: Compress-Archive -Path publish\* -DestinationPath OmniWatch-Preview.zip

    - uses: actions/upload-artifact@v4
      with:
        name: OmniWatch-Preview
        path: OmniWatch-Preview.zip

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: preview-${{ github.run_number }}
        name: OmniWatch Preview ${{ github.run_number }}
        files: OmniWatch-Preview.zip