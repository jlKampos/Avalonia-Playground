name: Preview Build

on:
  push:
    branches: [ "ci/preview" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Publish
      run: dotnet publish OmniWatch/OmniWatch.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:DebugType=portable -o publish/${{ matrix.rid }}

    - name: Package Linux
      if: matrix.rid == 'linux-x64'
      run: tar -czf OmniWatch-Preview-linux-x64.tar.gz -C publish/linux-x64 .

    - name: Package Windows
      if: matrix.rid == 'win-x64'
      run: zip -r OmniWatch-Preview-win-x64.zip publish/win-x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OmniWatch-${{ matrix.rid }}
        path: |
          OmniWatch-Preview-*.zip
          OmniWatch-Preview-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: preview-${{ github.run_number }}
        name: OmniWatch Preview ${{ github.run_number }}
        files: artifacts/**/*