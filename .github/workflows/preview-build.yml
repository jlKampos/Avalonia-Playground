name: Preview Build

on:
  push:
    branches: [ "overwatch-preview" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    # =========================
    # Checkout repo
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # Setup .NET
    # =========================
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # =========================
    # Restore dependencies
    # =========================
    - name: Restore
      run: dotnet restore

    # =========================
    # Build solution
    # =========================
    - name: Build
      run: dotnet build -c Release --no-restore

    # =========================
    # Publish Avalonia app
    # =========================
    - name: Publish
      run: dotnet publish OmniWatch/OmniWatch.csproj -c Release -r win-x64 --self-contained true -o publish

    # =========================
    # Create ZIP (download friendly)
    # =========================
    - name: Zip build
      run: Compress-Archive -Path publish\* -DestinationPath OmniWatch-Preview.zip

    # =========================
    # Upload artifact (GitHub Actions download)
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OmniWatch-Preview
        path: OmniWatch-Preview.zip

    # =========================
    # Create GitHub Release (homepage download)
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: preview-${{ github.run_number }}
        name: Overwatch Preview ${{ github.run_number }}
        files: OmniWatch-Preview.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}