name: Preview Build

on:
  push:
    branches: ["ci/preview"]
  workflow_dispatch:

concurrency:
  group: preview-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      # -----------------------------
      # PUBLISH (VERSION + UI VERSION)
      # -----------------------------
      - name: Publish
        run: >
          dotnet publish OmniWatch/OmniWatch.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -p:Version=1.0.${{ github.run_number }}
          -p:VersionSuffix=preview
          -p:InformationalVersion=1.0.${{ github.run_number }}-preview
          -o publish/${{ matrix.rid }}

      # -----------------------------
      # PACKAGE
      # -----------------------------
      - name: Package Linux
        if: matrix.rid == 'linux-x64'
        run: |
          cd publish/linux-x64
          tar -czf ../../OmniWatch-1.0.${{ github.run_number }}-preview-linux-x64.tar.gz .

      - name: Package Windows
        if: matrix.rid == 'win-x64'
        run: |
          cd publish/win-x64
          zip -r ../../OmniWatch-1.0.${{ github.run_number }}-preview-win-x64.zip .

      # -----------------------------
      # UPLOAD ARTIFACTS
      # -----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OmniWatch-${{ matrix.rid }}
          path: OmniWatch-1.0.${{ github.run_number }}-preview-${{ matrix.rid }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------
      # DOWNLOAD
      # -----------------------------
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # -----------------------------
      # CREATE PREVIEW RELEASE
      # -----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview-${{ github.run_number }}
          name: OmniWatch 1.0.${{ github.run_number }}-preview
          body: |
            🧪 Preview Build

            Version: 1.0.${{ github.run_number }}-preview
            Branch: ci/preview

            Auto-generated build for testing.

          files: artifacts/**/*
          prerelease: true
          draft: false