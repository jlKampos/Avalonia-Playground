<svg width="220" height="70" viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg">

	<!-- Background -->
	<rect width="220" height="70" rx="12" fill="#1A1A1A"></rect>

	<!-- Accent gradient -->
	<defs>
		<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#B4D400"></stop>
			<stop offset="100%" stop-color="#8FAA00"></stop>
		</linearGradient>
	</defs>

	<!-- Icon (centered vertically) -->
	<circle cx="50" cy="35" r="10" fill="url(#accent)"></circle>
	<circle cx="57" cy="30" r="6" fill="#1A1A1A"></circle>
	<circle cx="43" cy="40" r="6" fill="#1A1A1A"></circle>

	<!-- Subtle dots (system feel) -->
	<circle cx="180" cy="20" r="2" fill="#B4D400"></circle>
	<circle cx="190" cy="20" r="2" fill="#B4D400"></circle>
	<circle cx="200" cy="20" r="2" fill="#B4D400"></circle>

	<!-- App Name -->
	<text x="80" y="40" font-family="Segoe UI, Arial" font-size="18" fill="#E0E0E0" letter-spacing="0.5">
		OmniWatch
	</text>

</svg>